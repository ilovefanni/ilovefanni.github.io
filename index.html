<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>~100 ok, amiért szeretlek</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --rose:     #8a2040;
    --rose-mid: #c06080;
    --rose-lt:  #e0a0b0;
    --bg:       #fdf6f8;
  }

  body {
    background: var(--bg);
    font-family: 'Lato', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    padding: 24px 16px;
    gap: 0;
  }

  .hearts-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }
  .hearts-bg span {
    position: absolute;
    bottom: -40px;
    color: var(--rose-lt);
    opacity: 0;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(0); opacity: 0; }
    10%  { opacity: 0.22; }
    90%  { opacity: 0.12; }
    100% { transform: translateY(-110vh); opacity: 0; }
  }

  header {
    position: relative;
    z-index: 1;
    text-align: center;
    margin-bottom: 32px;
  }
  .header-deco {
    font-size: 0.85rem;
    color: var(--rose-lt);
    letter-spacing: 0.45em;
    margin-bottom: 10px;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: clamp(1.6rem, 6vw, 2.8rem);
    color: var(--rose);
    line-height: 1.15;
  }
  h1 em {
    font-style: italic;
    font-weight: 400;
    color: var(--rose-mid);
    font-size: 0.62em;
    display: block;
    margin-top: 5px;
  }
  .divider-line {
    width: 70px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--rose-lt), transparent);
    margin: 14px auto 0;
  }

  /* ── CARD ── */
  .card-scene {
    position: relative;
    z-index: 1;
    width: min(420px, 92vw);
    cursor: pointer;
    perspective: 900px;
  }

  .card {
    width: 100%;
    border-radius: 16px;
    background: linear-gradient(135deg, #fff5f7 0%, #ffeef5 55%, #fff5f0 100%);
    border: 1.5px solid var(--rose-lt);
    box-shadow: 0 8px 40px rgba(180,60,100,0.10);
    padding: 36px 32px 30px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
    min-height: 230px;
    justify-content: center;
    /* The flip animation */
    animation-name: none;
    animation-timing-function: ease-in-out;
    animation-fill-mode: both;
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 10% 30%, rgba(255,180,200,0.14) 0%, transparent 55%),
      radial-gradient(ellipse at 90% 70%, rgba(255,150,180,0.10) 0%, transparent 55%);
    pointer-events: none;
    border-radius: 16px;
  }

  .corner-heart {
    position: absolute;
    font-size: 1.1rem;
    color: var(--rose-lt);
    opacity: 0.35;
  }
  .corner-heart.tl { top: 12px; left: 16px; }
  .corner-heart.tr { top: 12px; right: 16px; }
  .corner-heart.bl { bottom: 12px; left: 16px; }
  .corner-heart.br { bottom: 12px; right: 16px; }

  .card-num {
    font-family: 'Lato', sans-serif;
    font-weight: 300;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--rose-lt);
    position: relative;
    z-index: 1;
  }
  .card-heart {
    font-size: 1.6rem;
    color: var(--rose-mid);
    opacity: 0.7;
    position: relative;
    z-index: 1;
    line-height: 1;
  }
  .card-divider {
    width: 50px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--rose-lt), transparent);
    position: relative;
    z-index: 1;
  }
  .card-text {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1.05rem, 4vw, 1.35rem);
    color: var(--rose);
    text-align: center;
    line-height: 1.45;
    position: relative;
    z-index: 1;
  }
  .tap-hint {
    font-size: 0.58rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--rose-lt);
    position: relative;
    z-index: 1;
    margin-top: 2px;
  }

  /* Flip keyframes: rotate 0→90 (card hides), then snap content, then 90→0 (card shows) */
  /* We use two half-animations chained via JS */
  @keyframes flipOut {
    0%   { transform: rotateY(0deg);  }
    100% { transform: rotateY(90deg); }
  }
  @keyframes flipIn {
    0%   { transform: rotateY(-90deg); }
    100% { transform: rotateY(0deg);   }
  }

  /* ── SPEED ROW ── */
  .speed-row {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 20px;
  }
  .speed-dots { display: flex; gap: 5px; }
  .speed-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--rose-lt);
    transition: background 0.3s, transform 0.3s;
  }
  .speed-dot.active { background: var(--rose-mid); transform: scale(1.35); }
  .speed-label {
    font-size: 0.6rem;
    color: var(--rose-lt);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    min-width: 110px;
  }

  footer {
    position: relative;
    z-index: 1;
    text-align: center;
    margin-top: 32px;
  }
  .footer-hearts { font-size: 0.8rem; letter-spacing: 0.4em; color: var(--rose-lt); opacity: 0.55; margin-bottom: 6px; }
  footer p { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.78rem; color: var(--rose-mid); opacity: 0.65; }
</style>
</head>
<body>

<div class="hearts-bg" id="heartsBg"></div>

<header>
  <div class="header-deco">♥ &nbsp; ♡ &nbsp; ♥ &nbsp; ♡ &nbsp; ♥</div>
  <h1>
    ~100 ok, amiért szeretlek
    <em>(a többit már nem bírta el az üveg)</em>
  </h1>
  <div class="divider-line"></div>
</header>

<div class="card-scene" id="scene">
  <div class="card" id="card">
    <span class="corner-heart tl">♥</span>
    <span class="corner-heart tr">♡</span>
    <span class="corner-heart bl">♡</span>
    <span class="corner-heart br">♥</span>
    <div class="card-num"  id="cardNum">#01</div>
    <div class="card-heart" id="cardHeart">♥</div>
    <div class="card-divider"></div>
    <div class="card-text" id="cardText">Mert a melóban kezdődött minden</div>
    <div class="tap-hint">érintsd meg a következőhöz ♡</div>
  </div>
</div>

<div class="speed-row">
  <div class="speed-dots" id="speedDots">
    <div class="speed-dot active"></div>
    <div class="speed-dot"></div>
    <div class="speed-dot"></div>
    <div class="speed-dot"></div>
    <div class="speed-dot"></div>
  </div>
  <div class="speed-label" id="speedLabel">lassan...</div>
</div>

<footer>
  <div class="footer-hearts">♥ &nbsp; ♡ &nbsp; ♥ &nbsp; ♡ &nbsp; ♥</div>
  <p>a mi sztorink &mdash; 1 év, és csak az eleje</p>
</footer>

<script>

  ["04","Mert ez nem csak egy kis kaland lett"],
  ["05","Mert most m\u00e1r \u00fagy n\u00e9z ki, \u00e9letre sz\u00f3l"],
  ["06","Mert az els\u0151 randink annyira gagyi volt, hogy m\u00e1r j\u00f3 volt"],
  ["07","Mert egy\u00fctt p\u00e1link\u00e1zni ment\u00fcnk a Gardenbe"],

  ["14","Mert egy\u00fctt kaland az \u00e9let"],
  ["15","Mert Szlov\u00e9ni\u00e1ban is egy\u00fctt voltunk"],
  ["16","Mert veled minden utaz\u00e1s eml\u00e9k lesz"],
  ["17","Mert mindig van k\u00f6z\u00f6s sztorink"],
  ["18","Mert veled m\u00e9g a b\u00e9n\u00e1z\u00e1s is \u00e9lm\u00e9ny"],
  ["19","Mert egy\u00fctt nevet\u00fcnk a m\u00faltunkon"],
  ["20","Mert veled minden els\u0151 k\u00fcl\u00f6nleges"],
  ["21","Mert szereted a Harry Potter vil\u00e1g\u00e1t"],
  ["22","Mert szereted a Star Wars univerzumot"],
  ["23","Mert im\u00e1dod a J\u00f3bar\u00e1tokat"],
  ["24","Mert egy\u00fctt tudunk sorozatozni"],
  ["25","Mert ugyanazokon a h\u00fclyeségeken nevet\u00fcnk"],
  ["26","Mert van k\u00f6z\u00f6s vil\u00e1gunk"],
  ["27","Mert k\u00f6nny\u0171 veled kapcsol\u00f3dni"],
  ["28","Mert \u00e9rted a p\u00f3enjaimat"],
  ["29","Mert n\u00e9ha m\u00e9g t\u00fal is sz\u00e1rnyalod \u0151ket"],
  ["30","Mert sosem unalmas veled"],
  ["31","Mert beleval\u00f3 vagy"],
  ["32","Mert talpraesett vagy"],
  ["33","Mert tudod, mit akarsz"],
  ["34","Mert van tart\u00e1sod"],
  ["35","Mert magabiztos vagy"],
  ["36","Mert vag\u00e1ny vagy"],
  ["37","Mert nem f\u00e9lsz \u00f6nmagad lenni"],
  ["38","Mert inspir\u00e1lsz"],
  ["39","Mert feln\u00e9zek r\u00e1d"],
  ["40","Mert b\u00faszke vagyok r\u00e1d"],
  ["41","Mert megvan a saj\u00e1t utad"],
  ["42","Mert \u00e9p\u00edted a karriered"],
  ["43","Mert c\u00e9ltudatos vagy"],
  ["44","Mert kitar\u00f3 vagy"],

  ["50","Mert egy\u00fctt haladunk el\u0151re"],

  ["54","Mert komolyan gondolkodsz a j\u00f6v\u0151r\u0151l"],

  ["60","Mert veled akarok j\u00f6v\u0151t"],

  ["62","Mert meghallgatsz"],
  ["63","Mert meg\u00e9rtesz"],
  ["64","Mert t\u0151r\u0151dsz velem"],
  ["65","Mert figyelsz r\u00e1m"],
  ["66","Mert ott vagy, amikor kell"],
  ["67","Mert t\u00e1mogatod az \u00e1lmaimat"],
  ["68","Mert hiszel bennem"],

  ["70","Mert csapat vagyunk"],
  ["71","Mert gy\u00f6ny\u00f6r\u0171 vagy"],
  ["72","Mert im\u00e1dom a mosolyod"],
  ["73","Mert szeretem, ahogy r\u00e1m n\u00e9zel"],
  ["74","Mert a jelenl\u00e9ted megnyugtat"],

  ["76","Mert a legjobb \u00f6lel\u00e9seid vannak"],
  ["77","Mert hi\u00e1nyzol, amikor nem vagy ott"],
  ["78","Mert veled akarok elaludni"],
  ["79","Mert veled akarok \u00e9bredni"],
  ["80","Mert egyszer\u0171en j\u00f3 veled lenni"],
  ["81","Mert egy\u00fctt h\u00fcly\u00e9sked\u00fcnk"],
  ["82","Mert \u00e9rted a s\u00f6t\u00e9t humorom"],
  ["83","Mert nem veszed t\u00fal komolyan az \u00e9letet"],
  ["84","Mert tudsz nevetni magadon"],
  ["85","Mert feldobod a napjaimat"],
  ["86","Mert mindig jobb kedvem lesz melletted"],
  ["87","Mert te vagy a kedvenc emberem"],
  ["88","Mert k\u00fcl\u00f6nleges vagy"],
  ["89","Mert nincs m\u00e9g egy ilyen, mint te"],
  ["90","Mert te vagy te"],
  ["91","Mert egy\u00fctt kezdt\u00fck, amikor nem volt egyszer\u0171"],
  ["92","Mert v\u00e9gigment\u00fcnk a \u201emi lesz ebb\u0151l?\u201d f\u00e1zison"],
  ["93","Mert kitartottunk"],
  ["94","Mert ebb\u0151l valami igaz lett"],
  ["95","Mert minden nap egyre biztosabb vagyok benned"],
  ["96","Mert veled akarok maradni"],
  ["97","Mert veled k\u00e9pzelem el a j\u00f6v\u0151t"],
  ["98","Mert te vagy az \u00e9n t\u00f6rt\u00e9netem"],
  ["99","Mert ez a mi sztorink"],
  ["100","Mert szeretlek \u2764\ufe0f"]
];

const hearts = ['♥','♡','♥','♡','♥','♡'];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

let queue = shuffle(reasons);
function next() {
  if (queue.length === 0) queue = shuffle(reasons);
  return queue.shift();
}

const card      = document.getElementById('card');
const cardNum   = document.getElementById('cardNum');
const cardHeart = document.getElementById('cardHeart');
const cardText  = document.getElementById('cardText');
const speedDots = document.querySelectorAll('.speed-dot');
const speedLabel= document.getElementById('speedLabel');

let animating = false;
let interval  = 3000;
const minInterval  = 400;
const accelFactor  = 0.87;
let autoTimer = null;

const stages = [
  { min: 2400, label: 'lassan\u2026',              dot: 0 },
  { min: 1600, label: 'gyorsul\u2026',             dot: 1 },
  { min: 900,  label: 'egyre gyorsabb',             dot: 2 },
  { min: 550,  label: 'sz\u00e1rny\u00e1l\u2026',  dot: 3 },
  { min: 0,    label: '\u2665 v\u00e9gtelen \u2665', dot: 4 },
];

function updateSpeedUI() {
  let stage = stages[stages.length-1];
  for (const s of stages) { if (interval >= s.min) { stage = s; break; } }
  speedDots.forEach((d,i) => d.classList.toggle('active', i <= stage.dot));
  speedLabel.textContent = stage.label;
}

function setContent([num, text]) {
  cardNum.textContent   = '#' + num;
  cardHeart.textContent = hearts[Math.floor(Math.random()*hearts.length)];
  cardText.textContent  = text;
}

function doFlip() {
  if (animating) return;
  animating = true;

  const halfDur = Math.min(interval * 0.4, 380); // ms for each half

  // Phase 1: rotate out to 90deg (edge-on, invisible)
  card.style.transition = `transform ${halfDur}ms ease-in`;
  card.style.transform  = 'rotateY(90deg)';

  setTimeout(() => {
    // Swap content while card is edge-on (invisible)
    setContent(next());

    // Phase 2: rotate in from -90deg to 0 (new face appears)
    card.style.transition = 'none';
    card.style.transform  = 'rotateY(-90deg)';

    // Force reflow so the browser registers the instant jump
    card.getBoundingClientRect();

    card.style.transition = `transform ${halfDur}ms ease-out`;
    card.style.transform  = 'rotateY(0deg)';

    setTimeout(() => { animating = false; }, halfDur + 10);
  }, halfDur);
}

function scheduleNext() {
  clearTimeout(autoTimer);
  autoTimer = setTimeout(() => {
    doFlip();
    interval = Math.max(minInterval, interval * accelFactor);
    updateSpeedUI();
    scheduleNext();
  }, interval);
}

// Tap to advance
document.getElementById('scene').addEventListener('click', () => {
  clearTimeout(autoTimer);
  doFlip();
  interval = Math.max(minInterval, interval * accelFactor);
  updateSpeedUI();
  scheduleNext();
});

// Init
setContent(next());
updateSpeedUI();
scheduleNext();

// Floating hearts
const bg = document.getElementById('heartsBg');
['♥','♡','♥','♡','♥','♡','♥','♡','♥','♡','♥','♡','♥','♡','♥','♡'].forEach(h => {
  const s = document.createElement('span');
  s.textContent = h;
  s.style.left = (Math.random()*100)+'%';
  s.style.fontSize = (0.5+Math.random()*0.75)+'rem';
  s.style.animationDuration = (13+Math.random()*17)+'s';
  s.style.animationDelay = (Math.random()*22)+'s';
  bg.appendChild(s);
});
</script>
</body>
</html>
